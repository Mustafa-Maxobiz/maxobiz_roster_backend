name: Prevent Secrets and Require .gitignore

on:
  push:
    branches:
      - '**'       # all current + future branches
  pull_request:
    branches:
      - '**'

jobs:
  check_files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Ensure .gitignore exists
        run: |
          if [ ! -f ".gitignore" ]; then
            echo ".gitignore is missing!"
            exit 1
          fi

      - name: Ensure .env files are not committed
        run: |
          forbidden_files=(.env .env.*)
          for f in "${forbidden_files[@]}"; do
            if git ls-files --error-unmatch "$f" > /dev/null 2>&1; then
              echo "ERROR: $f should not be committed!"
              exit 1
            fi
          done
